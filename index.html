<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elijah Moller · Vantaca Pay Practicum</title>
    <meta
      name="description"
      content="Interactive prototype: a 3-email multi-touch sequence to convert check payers to digital payment for Vantaca Pay."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Reusable icon defs (payment marks, lock, chevrons) -->
    <svg
      width="0"
      height="0"
      style="position: absolute"
      aria-hidden="true"
      focusable="false"
    >
      <defs>
        <symbol id="i-lock" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5Zm3 8H9V6a3 3 0 1 1 6 0v3Zm-3 5a1.75 1.75 0 0 1 1 3.19V20a1 1 0 1 1-2 0v-2.81A1.75 1.75 0 0 1 12 14Z"
          />
        </symbol>
        <symbol id="i-shield" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3Zm-1.2 13.4-3.1-3.1 1.4-1.4 1.7 1.7 4.1-4.1 1.4 1.4-5.5 5.5Z"
          />
        </symbol>
        <symbol id="i-bolt" viewBox="0 0 24 24">
          <path fill="currentColor" d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z" />
        </symbol>
        <symbol id="i-chevron" viewBox="0 0 24 24">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m9 6 6 6-6 6"
          />
        </symbol>
        <symbol id="i-check" viewBox="0 0 24 24">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="m5 13 4 4L19 7"
          />
        </symbol>
        <symbol id="i-clock" viewBox="0 0 24 24">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 7v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
          />
        </symbol>
        <symbol id="i-phone" viewBox="0 0 24 24">
          <rect
            x="6"
            y="2"
            width="12"
            height="20"
            rx="3"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            d="M10 5.5h4"
          />
        </symbol>
        <symbol id="i-apple" viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M16.4 12.7c0-2.2 1.8-3.3 1.9-3.3-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.6.8-3.3.8s-1.7-.8-2.9-.8c-1.5 0-2.9.9-3.6 2.2-1.6 2.7-.4 6.7 1.1 8.9.7 1.1 1.6 2.3 2.7 2.2 1.1 0 1.5-.7 2.8-.7s1.7.7 2.9.7 1.9-1.1 2.6-2.1c.8-1.2 1.2-2.3 1.2-2.4-.1 0-2.3-.9-2.3-3.7Zm-2.2-6.8c.6-.7 1-1.7.9-2.7-.9 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6 1 .1 1.9-.5 2.5-1.2Z"
          />
        </symbol>
        <symbol id="i-play" viewBox="0 0 24 24">
          <path fill="currentColor" d="M4 3.5 15.5 12 4 20.5V3.5Z" />
        </symbol>
      </defs>
    </svg>

    <header class="appbar">
      <div class="appbar__brand">
        <span class="appbar__logo" aria-hidden="true">VP</span>
        <div class="appbar__titles">
          <h1 class="appbar__title">Elijah Moller · Vantaca Pay Practicum</h1>
          <p class="appbar__subtitle">
            Option B · Multi-Touch Conversion Sequence
          </p>
        </div>
      </div>
      <div class="appbar__controls">
        <div class="seg" role="group" aria-label="Device preview">
          <button
            id="device-desktop"
            class="seg__btn is-active"
            type="button"
            data-device="desktop"
          >
            Desktop
          </button>
          <button
            id="device-mobile"
            class="seg__btn"
            type="button"
            data-device="mobile"
          >
            Mobile
          </button>
        </div>
      </div>
    </header>

    <main class="stage" id="stage">
      <!-- Device viewport holding inbox / email / checkout -->
      <section class="viewport" id="viewport" data-device="desktop">
        <div class="device" id="device">
          <div class="device__notch" aria-hidden="true"></div>
          <div class="device__screen" id="screen">
            <!-- Views injected by script.js -->
          </div>
        </div>
      </section>
    </main>

    <footer class="foot">
      <p>
        Illustrative prototype for the Vantaca Pay PM practicum. Copy, stats, and
        payment marks are representative placeholders.
      </p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
